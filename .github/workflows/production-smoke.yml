name: Production smoke test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Publieke https-URL zonder afsluitende slash
        required: false
        default: https://werkbladen-generator.vercel.app
        type: string
  schedule:
    - cron: '*/30 * * * *'

concurrency:
  group: production-smoke
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Check production availability
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url || 'https://werkbladen-generator.vercel.app' }}
        run: npm run smoke
      - name: Open incident issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[monitor] Productiecontrole mislukt'
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open'
            })
            if (!data.some((issue) => issue.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `De productiecontrole is mislukt. Bekijk de [workflowrun](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
              })
            }
      - name: Close recovered incident
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[monitor] Productiecontrole mislukt'
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open'
            })
            for (const issue of data.filter((candidate) => candidate.title === title)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: 'De productiecontrole is weer geslaagd; dit incident wordt automatisch gesloten.'
              })
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, state: 'closed'
              })
            }
