name: Production smoke test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Publieke https-URL zonder afsluitende slash
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm run smoke -- "${{ inputs.base_url }}"
