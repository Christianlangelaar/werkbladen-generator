name: Production smoke test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Publieke https-URL zonder afsluitende slash
        required: false
        default: https://werkbladen-generator.vercel.app
        type: string
  schedule:
    - cron: '*/30 * * * *'

concurrency:
  group: production-smoke
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Check production availability
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url || 'https://werkbladen-generator.vercel.app' }}
        run: npm run smoke
