name: Content evaluation

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Publieke URL die geëvalueerd moet worden
        required: false
        default: https://werkbladen-generator.vercel.app
        type: string
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read
  issues: write

concurrency:
  group: weekly-content-evaluation
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Evaluate representative AI content
        env:
          EVALUATION_BASE_URL: ${{ inputs.base_url || 'https://werkbladen-generator.vercel.app' }}
        run: npm run evaluate:content
      - name: Open content-quality issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[monitor] Inhoudsevaluatie mislukt'
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open'
            })
            if (!data.some((issue) => issue.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `De inhoudsevaluatie is mislukt. Bekijk de [workflowrun](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
              })
            }
      - name: Close recovered content issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[monitor] Inhoudsevaluatie mislukt'
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open'
            })
            for (const issue of data.filter((candidate) => candidate.title === title)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: 'De inhoudsevaluatie is weer geslaagd; dit incident wordt automatisch gesloten.'
              })
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, state: 'closed'
              })
            }
